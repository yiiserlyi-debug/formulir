<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>formulir pendaftaran</h1>

    <form action="">
        <label for="nisn">NISN</label>
        <input type="text" name="nisn" placeholder="masukan NISN">
        <br>
         <label for="nama">NAMA</label>
        <input type="text" name="nama" placeholder="masukan nama">
        <br>
         <label for="email">EMAIL</label>
        <input type="text" name="email" placeholder="masukan email">
         <br>
         <label for="password">password</label>
        <input type="password" name="password" placeholder="masukan password">
         <br>
         <label for="telepon">telepon</label>
        <input type="tel" name="telepon" placeholder="masukan telepon">
         <br>
         <label for="alamat">alamat</label>
        <textarea name="alamat" id="" rows="10"></textarea>
        <br>
         <label for="jenis">jenis kelamin</label>
        <input type="radio" nama="jenis" id="laki-laki">
         <label for="laki-laki">laki-laki</label>
        <input type="radio" nama="jenis" id="perempuan">
        <label for="perempuan">perempuan</label>
        <br>
    </form>
</body>
</html>
